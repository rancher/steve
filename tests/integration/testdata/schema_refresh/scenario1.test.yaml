scenarios:
- name: zero_to_some
  schemaID: refresh.cattle.io.zerotosomes
  crdName: zerotosomes.refresh.cattle.io
  resource:
    apiVersion: refresh.cattle.io/v1
    kind: ZeroToSome
    metadata:
      name: test-resource
      namespace: default
    foo: bar
  expectedInitial:
    - [test-resource, $timestamp]
  expectedUpdated:
    - [test-resource, bar]
  initialCRD:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: zerotosomes.refresh.cattle.io
    spec:
      group: refresh.cattle.io
      names:
        kind: ZeroToSome
        plural: zerotosomes
        singular: zerotosome
      scope: Namespaced
      versions:
      - name: v1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            properties:
              foo:
                type: string
  updatedCRD:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: zerotosomes.refresh.cattle.io
    spec:
      group: refresh.cattle.io
      names:
        kind: ZeroToSome
        plural: zerotosomes
        singular: zerotosome
      scope: Namespaced
      versions:
      - name: v1
        served: true
        storage: true
        additionalPrinterColumns:
        - name: Foo
          type: string
          jsonPath: .foo
        schema:
          openAPIV3Schema:
            type: object
            properties:
              foo:
                type: string
